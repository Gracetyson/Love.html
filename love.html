<!DOCTYPE html>

<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Question spéciale</title>

<style>

body{
font-family:Arial;
text-align:center;
background:#ffe6f0;
padding-top:120px;
overflow:hidden;
text-align: center;
}

h1{
color:#d63384;
}

button{
padding:15px 30px;
font-size:20px;
border:none;
border-radius:12px;
cursor:pointer;
margin-top: 125px;
justify-content: center;
gap: 20px;
transition: 0.2s;
}

#yes {

background:#28a745;
color:white;

}

#no{
background:#dc3545;
color:white;
position:absolute;

}

.heart{
position:absolute;
font-size:30px;
animation:fall 4s linear forwards;
}

@keyframes fall{
0%{
transform:translateY(-50px);
opacity:1;
}
100%{
transform:translateY(100vh);
opacity:0;
}
}

#celebration{
display:none;
font-size:40px;
margin-top:20px;
}

</style>

</head>

<body>
    <audio id="music" autoplay loop>
    <source src="04 NO ONE LIKE YOU'.mp3" type="audio/mpeg">
    </audio>

<h1 id="question">Veux-tu être ma petite amie ? ❤️</h1>


<button id="yes"  >Oui</button>
<button id="no">Non</button>
<div id="celebration">🫀🥳💖😍</div>


<script>

const noBtn = document.getElementById("no");
const yesBtn = document.getElementById("yes");
const music = document.getElementById("music");

let yesSize = 1;

yesBtn.onclick = function(){

music.play();    
yesBtn.style.display = "none";
noBtn.style.display = "none";

document.getElementById("question").innerHTML = "Je savais que tu dirais oui my love, Tu viens de rendre quelqu'un très heureux❤️";
document.getElementById("celebration").style.display = "block";

createHearts();

};

noBtn.addEventListener("mouseover", function(){

let width = window.innerWidth - 700;
let height = window.innerHeight - 700;

let randomX = Math.random() * width;
let randomY = Math.random() * height;

noBtn.style.left = randomX + "px";
noBtn.style.top = randomY + "px";

yesSize += 0.2;
yesBtn.style.transform = "scale("+yesSize+")";

});

function createHearts(){

for(let i=0;i<40;i++){

let heart = document.createElement("div");
heart.classList.add("heart");
heart.innerHTML = "💖";

heart.style.left = Math.random()*100 + "vw";
heart.style.animationDuration = (Math.random()*20+2) + "s";

document.body.appendChild(heart);

setTimeout(()=>{
heart.remove();
},15000);

}

}


</script>


</body>
</html
